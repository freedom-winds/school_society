services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://club_center:${MYSQL_PASSWORD:-change-me}@db:3306/club_center
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - club_uploads:/app/uploads
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: club_center
      MYSQL_USER: club_center
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-change-root-password}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
volumes:
  mysql_data:
  club_uploads:
